<div class="dish-form-container">
  <h2>{{ isEditMode ? 'Edit Dish' : 'Add Dish' }}</h2>

  <form [formGroup]="dishForm" (ngSubmit)="onSubmit()">
    <!-- Dish Name -->
    <div class="form-field">
      <label for="dishName">Dish Name</label>
      <input
        id="dishName"
        type="text"
        formControlName="name"
        placeholder="Enter dish name"
      />
      <span
        class="error-message"
        *ngIf="dishForm.get('name')?.touched && dishForm.get('name')?.hasError('required')"
      >
        Dish name is required.
      </span>
    </div>

    <!-- Category -->
    <div class="form-field">
      <label for="dishCategory">Category</label>
      <select id="dishCategory" formControlName="category">
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
      </select>
    </div>

    <!-- Ingredients -->
    <div class="ingredients-section">
      <h3>Ingredients</h3>

      <div formArrayName="ingredients">
        <div
          *ngFor="let ingredient of ingredients.controls; let i = index"
          [formGroupName]="i"
          class="ingredient-row"
        >
          <div class="ingredient-fields">
            <div class="form-field">
              <label [for]="'ingredientName' + i">Name</label>
              <input
                [id]="'ingredientName' + i"
                type="text"
                formControlName="name"
                placeholder="Ingredient name"
              />
              <span
                class="error-message"
                *ngIf="ingredient.get('name')?.touched && ingredient.get('name')?.hasError('required')"
              >
                Ingredient name is required.
              </span>
            </div>

            <div class="form-field">
              <label [for]="'ingredientQuantity' + i">Quantity</label>
              <input
                [id]="'ingredientQuantity' + i"
                type="number"
                formControlName="quantity"
                min="0.01"
                step="any"
              />
              <span
                class="error-message"
                *ngIf="ingredient.get('quantity')?.touched && ingredient.get('quantity')?.hasError('required')"
              >
                Quantity is required.
              </span>
              <span
                class="error-message"
                *ngIf="ingredient.get('quantity')?.touched && ingredient.get('quantity')?.hasError('min')"
              >
                Quantity must be greater than 0.
              </span>
            </div>

            <div class="form-field">
              <label [for]="'ingredientUnit' + i">Unit</label>
              <select [id]="'ingredientUnit' + i" formControlName="unit">
                <optgroup *ngFor="let group of unitGroups" [label]="group.label">
                  <option *ngFor="let u of group.units" [value]="u">{{ u }}</option>
                </optgroup>
              </select>
              <span
                class="error-message"
                *ngIf="ingredient.get('unit')?.touched && ingredient.get('unit')?.hasError('required')"
              >
                Unit is required.
              </span>
            </div>

            <div class="form-field">
              <label [for]="'ingredientCategory' + i">Category</label>
              <select [id]="'ingredientCategory' + i" formControlName="category">
                <option *ngFor="let cat of ingredientCategories" [value]="cat">{{ cat }}</option>
              </select>
            </div>
          </div>

          <button
            type="button"
            class="btn-remove"
            (click)="removeIngredient(i)"
            [disabled]="ingredients.length <= 1"
            aria-label="Remove ingredient"
          >
            Remove
          </button>
        </div>
      </div>

      <button type="button" class="btn-add" (click)="addIngredient()">
        + Add Ingredient
      </button>
    </div>

    <!-- Form Actions -->
    <div class="form-actions">
      <button type="submit" class="btn-submit">
        {{ isEditMode ? 'Update Dish' : 'Add Dish' }}
      </button>
      <button type="button" class="btn-cancel" (click)="cancel()">
        Cancel
      </button>
    </div>
  </form>
</div>
