<div class="shopping-list-container">
  <div class="shopping-list-header">
    <h2>Shopping List</h2>
    <div class="header-actions" *ngIf="hasSelection">
      <button
        class="btn-copy"
        (click)="copyAsText()"
        aria-label="Copy shopping list as text"
      >
        {{ copyButtonText }}
      </button>
      <button
        class="btn-print"
        (click)="print()"
        aria-label="Print shopping list"
      >
        Print
      </button>
    </div>
  </div>

  <p class="legend" *ngIf="hasSelection">
    ☐ Need to buy · ☑ Already on hand
  </p>

  <div *ngIf="hasSelection; else emptyState">
    <div *ngFor="let cat of activeCategories" class="category-frame">
      <h3 class="category-title">{{ cat }}</h3>

      <div class="shopping-list">
        <div
          *ngFor="let item of itemsByCategory[cat]"
          class="shopping-item"
          [class.checked]="item.checked"
        >
          <div class="item-main">
            <label class="item-label">
              <input
                type="checkbox"
                [checked]="item.checked"
                (change)="toggleChecked(item)"
                [attr.aria-label]="'Mark ' + item.name + ' as purchased'"
              />
              <span class="item-name">{{ item.name }}</span>
              <span class="item-total" *ngIf="item.totalQuantity !== null">
                {{ item.totalQuantity }} {{ item.totalUnit }}
              </span>
            </label>

            <div class="item-sources" *ngIf="item.sources.length > 1">
              <div *ngFor="let src of item.sources" class="source-line">
                · {{ src.quantity }} {{ src.unit }}
                <span class="source-dish">(for {{ src.dishName }})</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <ng-template #emptyState>
    <div class="empty-state">
      <span class="empty-state-icon">🛒</span>
      <p class="empty-state-text">Select at least one dish to build your list</p>
    </div>
  </ng-template>
</div>
